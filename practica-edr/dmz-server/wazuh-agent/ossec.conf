<ossec_config>
  <!-- ====================================================
       WAZUH AGENT — Configuració del servidor DMZ
       Exercici 3: EDR/EDM amb Wazuh
       ==================================================== -->

  <client>
    <server>
      <!-- IP del Wazuh Manager (xarxa LAN) -->
      <address>WAZUH_MANAGER_IP</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>ubuntu, ubuntu22</config-profile>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
    <crypto_method>aes</crypto_method>
  </client>

  <!-- ====================================================
       SYSCHECK — Monitorització d'integritat de fitxers
       ==================================================== -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>

    <!-- Directoris crítics -->
    <directories check_all="yes" realtime="yes">/etc,/usr/bin,/usr/sbin</directories>
    <directories check_all="yes" realtime="yes">/bin,/sbin</directories>
    <directories check_all="yes" realtime="yes">/var/ossec/etc</directories>

    <!-- Ignorar directoris volàtils -->
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/mail/statistics</ignore>
    <ignore>/etc/random-seed</ignore>
    <ignore>/etc/adjtime</ignore>
    <ignore>/etc/resolv.conf</ignore>
  </syscheck>

  <!-- ====================================================
       ROOTCHECK — Detecció de rootkits
       ==================================================== -->
  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <frequency>43200</frequency>
  </rootcheck>

  <!-- ====================================================
       VULNERABILITY DETECTION — Exercici 3a
       Escaneig CVEs del programari instal·lat
       ==================================================== -->
  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>1h</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="yes">yes</ports>
    <processes>yes</processes>
  </wodle>

  <!-- ====================================================
       LOG COLLECTION — Monitorització de logs del sistema
       ==================================================== -->
  <localfile>
    <!-- Auditd: binaris sospitosos i shells reversos (Exercici 3b) -->
    <log_format>audit</log_format>
    <location>/var/log/audit/audit.log</location>
  </localfile>

  <localfile>
    <!-- Auth: intents SSH, brute force (Exercici 3c) -->
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <localfile>
    <!-- Apache access log (Exercici 3b: processos fills) -->
    <log_format>apache</log_format>
    <location>/var/log/apache2/access.log</location>
  </localfile>

  <localfile>
    <!-- Apache error log -->
    <log_format>apache</log_format>
    <location>/var/log/apache2/error.log</location>
  </localfile>

  <localfile>
    <!-- Syslog general -->
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <!-- ====================================================
       ACTIVE RESPONSE — Exercici 3c: Brute Force SSH
       Afegeix IP atacant al firewall automàticament 24h
       ==================================================== -->
  <active-response>
    <!-- Executar firewall-drop davant atacs brute force -->
    <disabled>no</disabled>
    <command>firewall-drop</command>
    <location>local</location>
    <!-- Regles Wazuh de brute force SSH: 5712, 5763 -->
    <rules_id>5712,5763</rules_id>
    <!-- Temps de bloqueig: 86400 segons = 24 hores -->
    <timeout>86400</timeout>
  </active-response>

  <!-- ====================================================
       COMMAND MONITORING — Execució de processos
       ==================================================== -->
  <localfile>
    <log_format>full_command</log_format>
    <command>netstat -tulpn 2>/dev/null | grep LISTEN</command>
    <alias>netstat listening ports</alias>
    <frequency>360</frequency>
  </localfile>

  <localfile>
    <log_format>full_command</log_format>
    <command>ps aux 2>/dev/null</command>
    <alias>process list</alias>
    <frequency>360</frequency>
  </localfile>

</ossec_config>
