#!/usr/sbin/nft -f
# ============================================================
#  GATEWAY — nftables: Política de Denegació per Defecte
#  Exercici 2: Firewalling amb 5 serveis crítics (Stateful)
#
#  Zones:
#    WAN  → 10.0.0.0/24    (eth0 - externa)
#    LAN  → 192.168.10.0/24 (eth1 - gestió interna)
#    DMZ  → 172.16.0.0/24  (eth2 - servidor exposat)
# ============================================================

flush ruleset

# ── Definicions de variables ──────────────────────────────
define WAN_NET   = 10.0.0.0/24
define LAN_NET   = 192.168.10.0/24
define DMZ_NET   = 172.16.0.0/24
define DMZ_IP    = 172.16.0.10      # dmz-server
define LAN_MGMT  = 192.168.10.20    # lan-client (IP de gestió)
define DNS_AUTH  = 1.1.1.1          # Servidor DNS autoritzat
define NTP_SRV1  = 216.239.35.0     # time.google.com
define NTP_SRV2  = 162.159.200.1    # time.cloudflare.com

# ============================================================
#  TAULA PRINCIPAL: inet (IPv4 + IPv6)
# ============================================================
table inet filter {

    # ── Set per Rate Limiting SSH ──────────────────────────
    set ssh_ratelimit {
        type ipv4_addr
        flags dynamic
        timeout 1m
    }

    # ─────────────────────────────────────────────────────
    #  CHAIN INPUT — Paquets destinats al propi gateway
    # ─────────────────────────────────────────────────────
    chain input {
        type filter hook input priority 0; policy drop;

        # Permetre loopback
        iif lo accept

        # Permetre connexions establertes/relacionades (Stateful)
        ct state established,related accept

        # Descartar connexions invàlides
        ct state invalid drop

        # ICMP: només des de LAN (Exercici 2 — punt 5)
        ip protocol icmp ip saddr $LAN_NET accept
        ip protocol icmp drop

        # SSH de gestió: només des de LAN (al propi gateway)
        tcp dport 22 ip saddr $LAN_NET accept
        tcp dport 22 drop
    }

    # ─────────────────────────────────────────────────────
    #  CHAIN FORWARD — Paquets que travessen el gateway
    #  Política principal de segmentació de xarxa
    # ─────────────────────────────────────────────────────
    chain forward {
        type filter hook forward priority 0; policy drop;

        # Permetre connexions establertes/relacionades (Stateful)
        ct state established,related accept

        # Descartar paquets invàlids
        ct state invalid drop

        # ── Regla fonamental: DMZ NO pot iniciar connexions cap a LAN ──
        # (Exercici 1a: cap equip DMZ pot iniciar comunicació cap a LAN)
        ip saddr $DMZ_NET ip daddr $LAN_NET ct state new drop

        # ── LAN pot gestionar DMZ (SSH, ping) ──
        ip saddr $LAN_NET ip daddr $DMZ_NET accept

        # ──────────────────────────────────────────────────
        #  1. HTTP/HTTPS — Stateful (Exercici 2 — punt 1)
        #     Només SYN inicials + connexions establertes
        # ──────────────────────────────────────────────────
        ip daddr $DMZ_IP tcp dport { 80, 443 } ct state new tcp flags & (syn|ack) == syn accept
        ip daddr $DMZ_IP tcp dport { 80, 443 } ct state new tcp flags & (syn|ack) != syn drop

        # ──────────────────────────────────────────────────
        #  2. DNS — Només cap a servidor autoritzat (Exercici 2 — punt 2)
        #     Anti-DNS Tunneling: bloquejar paquets > 512 bytes
        # ──────────────────────────────────────────────────
        ip saddr $DMZ_IP ip daddr $DNS_AUTH udp dport 53 \
            meta length <= 512 ct state new accept
        ip saddr $DMZ_IP ip daddr $DNS_AUTH tcp dport 53 \
            meta length <= 512 ct state new accept
        # Bloquejar tot el reste de DNS (inclou DNS Tunneling)
        ip saddr $DMZ_IP udp dport 53 drop
        ip saddr $DMZ_IP tcp dport 53 drop

        # ──────────────────────────────────────────────────
        #  3. SSH — Només des de LAN, Rate Limiting 3/min (Exercici 2 — punt 3)
        # ──────────────────────────────────────────────────
        ip daddr $DMZ_IP tcp dport 22 ip saddr != $LAN_NET drop
        ip daddr $DMZ_IP tcp dport 22 ct state new \
            add @ssh_ratelimit { ip saddr ct count over 3 } drop
        ip daddr $DMZ_IP tcp dport 22 ip saddr $LAN_NET ct state new accept

        # ──────────────────────────────────────────────────
        #  4. NTP — Servidors específics, bloquejar paquets > 100B (Exercici 2 — punt 4)
        #     Anti-amplificació DoS NTP
        # ──────────────────────────────────────────────────
        ip saddr $DMZ_IP ip daddr { $NTP_SRV1, $NTP_SRV2 } udp dport 123 \
            meta length <= 100 ct state new accept
        ip saddr $DMZ_IP udp dport 123 drop

        # ──────────────────────────────────────────────────
        #  5. ICMP — Echo Request només des de LAN (Exercici 2 — punt 5)
        #     Bloquejar ICMP des de WAN (anti-enumeració d'hosts)
        # ──────────────────────────────────────────────────
        ip saddr $LAN_NET ip daddr $DMZ_NET icmp type echo-request accept
        ip saddr $WAN_NET icmp type echo-request drop

        # Wazuh Agent: comunicació cap al Manager (LAN)
        ip saddr $DMZ_IP ip daddr 192.168.10.30 tcp dport { 1514, 1515 } ct state new accept
    }

    # ─────────────────────────────────────────────────────
    #  CHAIN OUTPUT — Paquets originats al gateway
    # ─────────────────────────────────────────────────────
    chain output {
        type filter hook output priority 0; policy accept;
    }
}

# ============================================================
#  NAT — Masquerade per a tràfic sortint cap a WAN
# ============================================================
table ip nat {
    chain postrouting {
        type nat hook postrouting priority 100; policy accept;
        ip saddr { $LAN_NET, $DMZ_NET } oif != lo masquerade
    }
}
