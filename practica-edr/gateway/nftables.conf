#!/usr/sbin/nft -f
# ============================================================
#  GATEWAY — nftables: Política de Denegació per Defecte
#  Exercici 2: Firewalling amb 5 serveis crítics (Stateful)
# ============================================================

flush ruleset

# ── Definicions de variables ──────────────────────────────
define WAN_NET   = 10.0.0.0/24
define LAN_NET   = 192.168.10.0/24
define DMZ_NET   = 172.16.0.0/24
define DMZ_IP    = 172.16.0.10      # dmz-server
define LAN_MGMT  = 192.168.10.20    # lan-client (IP de gestió)
define DNS_AUTH  = 1.1.1.1          # Servidor DNS autoritzat
define NTP_SRV1  = 216.239.35.0     # time.google.com
define NTP_SRV2  = 162.159.200.1    # time.cloudflare.com

# ============================================================
#  TAULA PRINCIPAL: inet (IPv4 + IPv6)
# ============================================================
table inet filter {

    # ─────────────────────────────────────────────────────
    #  CHAIN INPUT
    # ─────────────────────────────────────────────────────
    chain input {
        type filter hook input priority 0; policy drop;
        iif lo accept
        ct state established,related accept
        ct state invalid drop
        ip protocol icmp ip saddr $LAN_NET accept
        ip protocol icmp drop
        tcp dport 22 ip saddr $LAN_NET accept
        tcp dport 22 drop
    }

    # ─────────────────────────────────────────────────────
    #  CHAIN FORWARD 
    # ─────────────────────────────────────────────────────
    chain forward {
        type filter hook forward priority 0; policy drop;

        ct state established,related accept
        ct state invalid drop

        # ── Regla fonamental: DMZ NO pot iniciar connexions cap a LAN ──
        ip saddr $DMZ_NET ip daddr $LAN_NET ct state new drop

        # ── LAN pot gestionar DMZ (SSH, ping) ──
        ip saddr $LAN_NET ip daddr $DMZ_NET accept

        # ──────────────────────────────────────────────────
        #  1. HTTP/HTTPS — Stateful 
        # ──────────────────────────────────────────────────
        ip daddr $DMZ_IP tcp dport { 80, 443 } ct state new tcp flags & (syn|ack) == syn accept
        ip daddr $DMZ_IP tcp dport { 80, 443 } ct state new drop

        # ──────────────────────────────────────────────────
        #  2. DNS — Anti-DNS Tunneling
        # ──────────────────────────────────────────────────
        ip saddr $DMZ_IP ip daddr $DNS_AUTH udp dport 53 accept
        ip saddr $DMZ_IP ip daddr $DNS_AUTH tcp dport 53 accept
        ip saddr $DMZ_IP udp dport 53 drop
        ip saddr $DMZ_IP tcp dport 53 drop

        # ──────────────────────────────────────────────────
        #  3. SSH — Només des de LAN, Rate Limiting 3/min 
        # ──────────────────────────────────────────────────
        ip daddr $DMZ_IP tcp dport 22 ip saddr != $LAN_NET drop
        # ip daddr $DMZ_IP tcp dport 22 ct state new limit rate over 3/minute drop
        ip daddr $DMZ_IP tcp dport 22 ip saddr $LAN_NET ct state new accept

        # ──────────────────────────────────────────────────
        #  4. NTP — Anti-amplificació DoS NTP
        # ──────────────────────────────────────────────────
        ip saddr $DMZ_IP ip daddr { $NTP_SRV1, $NTP_SRV2 } udp dport 123 accept
        ip saddr $DMZ_IP udp dport 123 drop

        # ──────────────────────────────────────────────────
        #  5. ICMP — Echo Request només des de LAN 
        # ──────────────────────────────────────────────────
        ip saddr $LAN_NET ip daddr $DMZ_NET icmp type echo-request accept
        ip saddr $WAN_NET icmp type echo-request drop

        # Wazuh Agent
        ip saddr $DMZ_IP ip daddr 192.168.10.30 tcp dport { 1514, 1515 } ct state new accept
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}

# ============================================================
#  NAT
# ============================================================
table ip nat {
    chain postrouting {
        type nat hook postrouting priority 100; policy accept;
        ip saddr { $LAN_NET, $DMZ_NET } oif != lo masquerade
    }
}
