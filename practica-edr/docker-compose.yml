# ============================================================
#  PRÀCTICA EDR — Docker Compose
#  Zones: WAN (10.0.0.0/24) | LAN (192.168.10.0/24) | DMZ (172.16.0.0/24)
# ============================================================

networks:
  net_wan:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.0.0/24
  net_lan:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.10.0/24
  net_dmz:
    driver: bridge
    ipam:
      config:
        - subnet: 172.16.0.0/24

volumes:
  wazuh_indexer_data:
  wazuh_manager_etc:
  wazuh_manager_var:

services:

  # ──────────────────────────────────────────────────────────
  #  GATEWAY — Router/Firewall (nftables)
  #  Connectat a les 3 xarxes. Sense IP estàtica (Docker assigna)
  # ──────────────────────────────────────────────────────────
  gateway:
    build: ./gateway
    container_name: gateway
    hostname: gateway
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.accept_source_route=0
      - net.ipv4.conf.all.send_redirects=0
      - net.ipv4.conf.all.accept_redirects=0
      - net.ipv4.conf.default.accept_source_route=0
      - net.ipv4.conf.default.send_redirects=0
      - net.ipv4.conf.default.accept_redirects=0
    networks:
      - net_wan
      - net_lan
      - net_dmz
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  #  DMZ SERVER — Apache2 + SSH + Wazuh Agent + auditd
  # ──────────────────────────────────────────────────────────
  dmz-server:
    build: ./dmz-server
    container_name: dmz-server
    hostname: dmz-server
    privileged: true
    cap_add:
      - NET_ADMIN
      - AUDIT_CONTROL
      - AUDIT_WRITE
    networks:
      net_dmz:
        ipv4_address: 172.16.0.10
    ports:
      - "8080:80"
      - "2222:22"
    environment:
      - WAZUH_MANAGER=192.168.10.30
      - WAZUH_AGENT_NAME=dmz-server
    depends_on:
      - gateway
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  #  LAN CLIENT — Gestió + Hydra (simulació brute force)
  # ──────────────────────────────────────────────────────────
  lan-client:
    build: ./lan-client
    container_name: lan-client
    hostname: lan-client
    networks:
      net_lan:
        ipv4_address: 192.168.10.20
    depends_on:
      - gateway
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  #  WAZUH INDEXER (OpenSearch)
  # ──────────────────────────────────────────────────────────
  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.7.3
    container_name: wazuh-indexer
    hostname: wazuh-indexer
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - bootstrap.memory_lock=true
      - discovery.type=single-node
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - wazuh_indexer_data:/var/lib/wazuh-indexer
    networks:
      net_lan:
        ipv4_address: 192.168.10.31
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  #  WAZUH MANAGER
  # ──────────────────────────────────────────────────────────
  wazuh-manager:
    image: wazuh/wazuh-manager:4.7.3
    container_name: wazuh-manager
    hostname: wazuh-manager
    volumes:
      - wazuh_manager_etc:/var/ossec/etc
      - wazuh_manager_var:/var/ossec/var
      - ./wazuh/config/local_rules.xml:/var/ossec/etc/rules/local_rules.xml
      - ./wazuh/config/active-response/firewall-drop.sh:/var/ossec/active-response/bin/firewall-drop.sh
    ports:
      - "1514:1514/udp"
      - "1515:1515"
      - "55000:55000"
    networks:
      net_lan:
        ipv4_address: 192.168.10.30
    depends_on:
      - wazuh-indexer
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  #  WAZUH DASHBOARD
  # ──────────────────────────────────────────────────────────
  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.7.3
    container_name: wazuh-dashboard
    hostname: wazuh-dashboard
    environment:
      - WAZUH_API_URL=https://192.168.10.30
      - INDEXER_URL=https://wazuh-indexer:9200
      - OPENSEARCH_URL=https://wazuh-indexer:9200
    ports:
      - "8443:5601"
    networks:
      net_lan:
        ipv4_address: 192.168.10.32
    depends_on:
      - wazuh-indexer
      - wazuh-manager
    restart: unless-stopped
