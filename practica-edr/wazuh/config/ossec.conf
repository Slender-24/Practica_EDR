<ossec_config>
  <!-- ====================================================
       WAZUH MANAGER — Configuració principal
       Exercici 3: EDR/EDM centralitzat
       ==================================================== -->

  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <logall_json>no</logall_json>
    <email_notification>no</email_notification>
    <smtp_server>smtp.example.wazuh.com</smtp_server>
    <email_from>wazuh@example.wazuh.com</email_from>
    <email_to>admin@example.wazuh.com</email_to>
    <email_maxperhour>12</email_maxperhour>
    <agents_disconnection_time>10m</agents_disconnection_time>
    <agents_disconnection_alert_time>0</agents_disconnection_alert_time>
  </global>

  <!-- ====================================================
       VULNERABILITY DETECTION — Exercici 3a
       Escaneig CVEs en temps real
       ==================================================== -->
  <vulnerability-detector>
    <enabled>yes</enabled>
    <interval>5m</interval>
    <min_full_scan_interval>6h</min_full_scan_interval>
    <run_on_start>yes</run_on_start>

    <!-- Base de dades de vulnerabilitats NVD (NIST) -->
    <provider name="nvd">
      <enabled>yes</enabled>
      <os>
        <name>Ubuntu</name>
        <versions>22,20</versions>
      </os>
      <update_interval>1h</update_interval>
    </provider>
  </vulnerability-detector>

  <!-- ====================================================
       ACTIVE RESPONSE — Exercici 3c
       Comanda firewall-drop per a brute force SSH
       ==================================================== -->
  <command>
    <name>firewall-drop</name>
    <executable>firewall-drop.sh</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <active-response>
    <disabled>no</disabled>
    <command>firewall-drop</command>
    <location>local</location>
    <!-- Regles brute force SSH de Wazuh -->
    <rules_id>5712,5763,5764</rules_id>
    <!-- 86400 seg = 24 hores (Exercici 3c) -->
    <timeout>86400</timeout>
  </active-response>

  <!-- ====================================================
       ENROLLMENT — Registre d'agents
       ==================================================== -->
  <auth>
    <disabled>no</disabled>
    <port>1515</port>
    <use_source_ip>no</use_source_ip>
    <purge>yes</purge>
    <use_password>no</use_password>
    <force>
      <enabled>yes</enabled>
      <key_mismatch>yes</key_mismatch>
      <disconnected_time enabled="yes">1h</disconnected_time>
      <after_registration_time>1h</after_registration_time>
    </force>
  </auth>

  <!-- ====================================================
       CLUSTER — Desactivat (single-node)
       ==================================================== -->
  <cluster>
    <name>wazuh</name>
    <node_name>master</node_name>
    <node_type>master</node_type>
    <key>c98006f08d0e6f7d7ee5e90c15e74e65</key>
    <port>1516</port>
    <bind_addr>0.0.0.0</bind_addr>
    <nodes>
      <node>localhost</node>
    </nodes>
    <hidden>no</hidden>
    <disabled>yes</disabled>
  </cluster>

  <!-- ====================================================
       SYSCHECK — FIM al manager
       ==================================================== -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>
    <directories>/etc,/usr/bin,/usr/sbin</directories>
    <directories>/bin,/sbin,/boot</directories>
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/resolv.conf</ignore>
  </syscheck>

  <!-- ====================================================
       RULESET — Regles personalitzades
       ==================================================== -->
  <ruleset>
    <decoder_dir>ruleset/decoders</decoder_dir>
    <rule_dir>ruleset/rules</rule_dir>
    <!-- Regles personalitzades EDR -->
    <rule_include>etc/rules/local_rules.xml</rule_include>
    <list>etc/lists/audit-keys</list>
    <list>etc/lists/amazon/aws-eventnames</list>
    <list>etc/lists/security-eventchannel</list>
  </ruleset>

  <!-- ====================================================
       LOG COLLECTION — Manager propi
       ==================================================== -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/ossec/logs/active-responses.log</location>
  </localfile>

  <localfile>
    <log_format>json</log_format>
    <location>/var/ossec/logs/alerts/alerts.json</location>
  </localfile>

</ossec_config>
